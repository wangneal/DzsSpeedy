name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64]

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust targets
        run: rustup target add i686-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install frontend dependencies
        run: npm ci

      - name: Get version
        id: version
        run: |
          $ver = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build
        run: npx tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: DzsSpeedy-${{ steps.version.outputs.version }}-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: DzsSpeedy-${{ steps.version.outputs.version }}-portable
          path: |
            src-tauri/target/release/DzsSpeedy.exe
            src-tauri/target/release/bridge32.exe
            src-tauri/target/release/bridge64.exe
            src-tauri/target/release/speedpatch32.dll
            src-tauri/target/release/speedpatch64.dll
